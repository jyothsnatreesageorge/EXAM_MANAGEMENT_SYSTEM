<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Exam</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar navbar-light shadow-sm mb-4">
    <div class="container-fluid">
      <h4 class="m-0">Create Exam</h4>
      <a href="index.html" class="btn btn-light btn-sm">← Back to Dashboard</a>
    </div>
  </nav>

  <div class="container mt-5">
    <div class="card p-4 shadow-sm">
      <h5>Set Up a New Exam</h5>
      <form>
        <div class="mb-3">
          <label class="form-label">Exam Title</label>
          <input type="text" class="form-control" placeholder="Enter exam name">
        </div>
        <div class="mb-3">
          <label class="form-label">Subject</label>
          <input type="text" class="form-control" placeholder="Enter subject">
        </div>
        <div class="mb-3">
          <label class="form-label">Date & Time</label>
          <input type="datetime-local" class="form-control">
        </div>
        <button type="submit" class="btn btn-danger">Create Exam</button>
      </form>
    </div>
  </div>
</body>
</html>
