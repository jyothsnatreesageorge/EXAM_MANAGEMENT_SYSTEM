<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Exam</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #e8eef3; /* Dashboard background color */
      min-height: 100vh;
    }
    .navbar {
      background: linear-gradient(90deg, #34495e 0%, #2c3e50 100%); /* Dark gradient for navbar */
      color: white;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }
    .navbar h4 {
      color: white !important;
      font-weight: 600;
    }
    .btn-light {
      color: #ecf0f1;
      background-color: #5d6d7e;
      border-color: #5d6d7e;
    }
    .btn-light:hover {
      color: #fff;
      background-color: #798d9f;
      border-color: #798d9f;
    }
    .card {
      border-radius: 15px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.15);
      border: none;
    }
    .btn-danger {
      background-color: #e74c3c;
      border-color: #e74c3c;
      font-weight: 600;
      padding: 10px 30px;
      border-radius: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .btn-danger:hover {
      background-color: #c0392b;
      border-color: #c0392b;
    }
    .form-control, .form-label {
        font-size: 14px;
    }
  </style>
</head>
<body>
  <nav class="navbar shadow-sm mb-4">
    <div class="container-fluid">
      <h4 class="m-0">Create Exam</h4>
      <a href="index.html" class="btn btn-light btn-sm">← Back to Dashboard</a>
    </div>
  </nav>

  <div class="container mt-5">
    <div class="card p-4 shadow-sm">
      <h5>Set Up a New Exam</h5>
      <form>
        <div class="mb-3">
          <label class="form-label">Exam Title</label>
          <input type="text" class="form-control" placeholder="Enter exam name">
        </div>
        <div class="mb-3">
          <label class="form-label">Subject</label>
          <input type="text" class="form-control" placeholder="Enter subject">
        </div>
        <div class="mb-3">
          <label class="form-label">Date & Time</label>
          <input type="datetime-local" class="form-control">
        </div>
        <button type="button" class="btn btn-danger" onclick="window.location.href='create_mcq_questions.html'">
          Create & Add Questions
        </button>
      </form>
    </div>
  </div>
</body>
</html>
