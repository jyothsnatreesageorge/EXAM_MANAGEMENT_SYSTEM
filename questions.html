<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exam Page</title>
<style>
  body {
    font-family: "Segoe UI", sans-serif;
    margin: 0;
    background: #f5f5f5;
  }
  .navbar {
    background: #1e1e1e;
    color: #fff;
    padding: 10px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .timer {
    font-weight: bold;
  }
  .container {
    display: flex;
    margin: 20px;
    gap: 20px;
  }
  .main-content {
    flex: 3;
    background: #fff;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    min-height: 300px;
  }
  .sidebar {
    flex: 1;
    background: #fff;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    height: fit-content;
  }
  .question h3 {
    margin-bottom: 15px;
  }
  .options button {
    display: block;
    margin: 5px 0;
    padding: 8px 12px;
    border-radius: 5px;
    border: 1px solid #ccc;
    background: #eee;
    cursor: pointer;
    width: 100%;
  }
  .options button.selected {
    background: #4CAF50;
    color: white;
  }
  .question-status {
    display: grid;
    grid-template-columns: repeat(5, 25px);
    gap: 5px;
    margin-top: 10px;
  }
  .question-status div {
    width: 25px;
    height: 25px;
    border-radius: 50%;
    background: red; /* unanswered default */
  }
  .question-status div.answered {
    background: green;
  }
  .nav-buttons {
    margin-top: 20px;
    display: flex;
    justify-content: space-between;
  }
  .nav-buttons button {
    padding: 10px 15px;
    background: #1e1e1e;
    color: #fff;
    border: none;
    border-radius: 6px;
    cursor: pointer;
  }
  .submit-btn {
    margin-top: 20px;
    padding: 10px;
    width: 100%;
    background: #1e1e1e;
    color: #fff;
    border: none;
    border-radius: 6px;
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="navbar">
  <div>Exam Title</div>
  <div class="timer" id="timer">Time: 60:00</div>
</div>

<div class="container">
  <!-- Left: Question -->
  <div class="main-content" id="questionArea">
    <!-- Question will be injected here dynamically -->
  </div>

  <!-- Right: Sidebar -->
  <div class="sidebar">
    <h3>Total Questions: <span id="totalQuestions"></span></h3>
    <h4>Status:</h4>
    <div class="question-status" id="questionStatus"></div>
    <button class="submit-btn" onclick="submitExam()">Submit Exam</button>
  </div>
</div>

<script>
// Sample questions
const questions = [
  {q: "What is the capital of France?", options: ["Paris", "London", "Berlin", "Rome"]},
  {q: "What is 2 + 2?", options: ["3", "4", "5", "6"]},
  {q: "Which is a programming language?", options: ["Python", "Snake", "Lion", "Tiger"]}
];

const totalQuestions = questions.length;
document.getElementById('totalQuestions').textContent = totalQuestions;

// Create status indicators
const statusDiv = document.getElementById('questionStatus');
const statusIndicators = [];
for(let i=0;i<totalQuestions;i++){
  const div = document.createElement('div');
  div.id = 'q'+(i+1);
  div.textContent = i+1; // <-- Add question number inside the circle
  div.style.display = 'flex';
  div.style.alignItems = 'center';
  div.style.justifyContent = 'center';
  div.style.color = 'white';
  div.style.fontSize = '12px';
  statusDiv.appendChild(div);
  statusIndicators.push(div);
}

let currentQ = 0;
const answers = Array(totalQuestions).fill(null);

function renderQuestion(){
  const area = document.getElementById('questionArea');
  area.innerHTML = '';
  const qObj = questions[currentQ];

  const qDiv = document.createElement('div');
  qDiv.classList.add('question');
  qDiv.innerHTML = `<h3>Q${currentQ+1}. ${qObj.q}</h3>`;
  
  const optionsDiv = document.createElement('div');
  optionsDiv.classList.add('options');
  
  qObj.options.forEach((opt,i)=>{
    const btn = document.createElement('button');
    btn.textContent = opt;
    if(answers[currentQ]===i) btn.classList.add('selected');
    btn.onclick = ()=>selectAnswer(currentQ, i);
    optionsDiv.appendChild(btn);
  });
  
  qDiv.appendChild(optionsDiv);

  // Navigation buttons
  const navDiv = document.createElement('div');
  navDiv.classList.add('nav-buttons');
  if(currentQ>0){
    const prevBtn = document.createElement('button');
    prevBtn.textContent = 'Previous';
    prevBtn.onclick = ()=>{ currentQ--; renderQuestion(); };
    navDiv.appendChild(prevBtn);
  }
  if(currentQ<totalQuestions-1){
    const nextBtn = document.createElement('button');
    nextBtn.textContent = 'Next';
    nextBtn.onclick = ()=>{ currentQ++; renderQuestion(); };
    navDiv.appendChild(nextBtn);
  }
  qDiv.appendChild(navDiv);

  area.appendChild(qDiv);
}

function selectAnswer(qIndex, optionIndex){
  answers[qIndex] = optionIndex;
  // Update status
  const div = document.getElementById('q'+(qIndex+1));
  div.classList.add('answered');
  renderQuestion();
}

function submitExam(){
  window.location.href = "submission.html";
}

// Timer
let timeLeft = 60*60;
const timerEl = document.getElementById('timer');
setInterval(()=>{
  let minutes = Math.floor(timeLeft/60);
  let seconds = timeLeft % 60;
  timerEl.textContent = `Time: ${minutes}:${seconds<10?'0'+seconds:seconds}`;
  timeLeft--;
},1000);

// Initial render
renderQuestion();
</script>

</body>
</html>
