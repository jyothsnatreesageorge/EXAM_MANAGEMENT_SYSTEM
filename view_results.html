<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>View Results</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #e8eef3; /* Dashboard background color */
      min-height: 100vh;
    }
    .navbar {
      background: linear-gradient(90deg, #34495e 0%, #2c3e50 100%); /* Dark gradient for navbar */
      color: white;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }
    .navbar h4 {
      color: white !important;
      font-weight: 600;
    }
    .btn-light {
      color: #ecf0f1;
      background-color: #5d6d7e;
      border-color: #5d6d7e;
    }
    .btn-light:hover {
      color: #fff;
      background-color: #798d9f;
      border-color: #798d9f;
    }
    .card {
      border-radius: 15px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.15);
      border: none;
    }
    .table thead th {
        background-color: #34495e;
        color: white;
        border: none;
        font-weight: 600;
    }
    .table-striped > tbody > tr:nth-of-type(odd) > * {
        background-color: #f4f6f9;
    }
    .table {
        border-radius: 10px;
        overflow: hidden;
    }
  </style>
</head>
<body>
  <nav class="navbar shadow-sm mb-4">
    <div class="container-fluid">
      <h4 class="m-0">View Results</h4>
      <a href="index.html" class="btn btn-light btn-sm">← Back to Dashboard</a>
    </div>
  </nav>

  <div class="container mt-5">
    <div class="card p-4 shadow-sm">
      <h5>Students’ Results</h5>
      <table class="table table-striped mt-3">
        <thead>
          <tr>
            <th>Roll No</th>
            <th>Name</th>
            <th>Marks</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody>
          <tr><td>101</td><td>Riya</td><td>92</td><td>Pass</td></tr>
          <tr><td>102</td><td>Devi</td><td>67</td><td>Pass</td></tr>
          <tr><td>103</td><td>Rahul</td><td>43</td><td>Fail</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</body>
</html>
