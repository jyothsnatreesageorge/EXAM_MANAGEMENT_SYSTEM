<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Publish Results</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar navbar-light shadow-sm mb-4">
    <div class="container-fluid">
      <h4 class="m-0">Publish Results</h4>
      <a href="index.html" class="btn btn-light btn-sm">← Back to Dashboard</a>
    </div>
  </nav>

  <div class="container mt-5">
    <div class="card p-4 shadow-sm">
      <h5>Upload & Publish Exam Results</h5>
      <form>
        <div class="mb-3">
          <label class="form-label">Select Exam</label>
          <select class="form-select">
            <option>DBMS Midterm</option>
            <option>Data Structures Final</option>
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label">Upload Result File (.csv)</label>
          <input type="file" class="form-control">
        </div>
        <button type="submit" class="btn btn-warning">Publish</button>
      </form>
    </div>
  </div>
</body>
</html>
