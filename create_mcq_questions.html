<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Questions</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #e8eef3; min-height: 100vh; }
    .navbar { background: linear-gradient(90deg, #34495e 0%, #2c3e50 100%); color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
    .navbar h4 { color: white !important; font-weight: 600; }
    .btn-light { color: #ecf0f1; background-color: #5d6d7e; border-color: #5d6d7e; }
    .btn-light:hover { color: #fff; background-color: #798d9f; border-color: #798d9f; }
    .card { border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.15); border: none; margin-bottom: 20px; }
    .btn-primary { background-color: #3498db; border-color: #3498db; font-weight: 600; padding: 10px 30px; border-radius: 8px; }
    .btn-primary:hover { background-color: #2980b9; border-color: #2980b9; }
    .btn-outline-secondary { font-weight: 600; padding: 10px 20px; border-radius: 8px; }
    .form-control, .form-label, .form-select { font-size: 14px; }
    .question-box { border: 1px solid #ccc; padding: 20px; border-radius: 10px; margin-top: 15px; background-color: #fcfdff; }
  </style>
</head>
<body>

  <nav class="navbar shadow-sm mb-4">
    <div class="container-fluid">
      <h4 class="m-0">Add Questions</h4>
      <a href="create_exam.html" class="btn btn-light btn-sm">← Back to Exam Setup</a>
    </div>
  </nav>

  <div class="container mt-5">
    <div class="card p-4 shadow-sm">
      <h5>Add Multiple Choice Questions (MCQs)</h5>
      <p>Exam: <span id="examTitle"></span> | Subject: <span id="subjectName"></span></p>
      
      <div id="question-form-container">
        <div class="question-box" id="question-template">
          <h6 class="mb-3" data-question-number="1">Question 1</h6>
          <div class="mb-3">
            <label class="form-label">Question Text</label>
            <textarea class="form-control" rows="3" placeholder="Enter the question text..." name="q1_text"></textarea>
          </div>

          <div class="row mb-3">
            <div class="col-md-6 mb-3">
              <label class="form-label">Option A</label>
              <input type="text" class="form-control" placeholder="Enter option A" name="q1_opt_a">
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Option B</label>
              <input type="text" class="form-control" placeholder="Enter option B" name="q1_opt_b">
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Option C</label>
              <input type="text" class="form-control" placeholder="Enter option C" name="q1_opt_c">
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Option D</label>
              <input type="text" class="form-control" placeholder="Enter option D" name="q1_opt_d">
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label">Correct Answer</label>
            <select class="form-select" name="q1_correct_answer">
              <option selected value="">Select Correct Option</option>
              <option value="A">A</option>
              <option value="B">B</option>
              <option value="C">C</option>
              <option value="D">D</option>
            </select>
          </div>
        </div>
      </div>

      <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
        <button type="button" class="btn btn-outline-secondary" onclick="addQuestion()" id="addQuestionBtn">Add Another Question</button>
        <button type="button" class="btn btn-primary" onclick="saveAndFinish()">Save All Questions & Finish</button>
      </div>
    </div>
  </div>

<script>
let questionCount = 1;

// Read URL parameters
const urlParams = new URLSearchParams(window.location.search);
const totalQuestions = parseInt(urlParams.get('total_questions')) || 1;
const examTitle = urlParams.get('exam_title');
const subject = urlParams.get('subject');

document.getElementById('examTitle').innerText = examTitle;
document.getElementById('subjectName').innerText = subject;

function addQuestion() {
    if (questionCount >= totalQuestions) {
        alert(`You can only add ${totalQuestions} questions.`);
        return;
    }

    questionCount++;
    const container = document.getElementById('question-form-container');
    const template = document.getElementById('question-template');
    const newQuestionBox = template.cloneNode(true);
    newQuestionBox.id = '';

    const header = newQuestionBox.querySelector('[data-question-number]');
    header.innerText = `Question ${questionCount}`;
    header.setAttribute('data-question-number', questionCount);

    const inputs = newQuestionBox.querySelectorAll('textarea, input, select');
    inputs.forEach(input => {
        const oldName = input.name;
        if (oldName) input.name = oldName.replace(`q${questionCount - 1}`, `q${questionCount}`);
        if (input.tagName === 'SELECT') input.value = '';
        else input.value = '';
    });

    container.appendChild(newQuestionBox);
    newQuestionBox.scrollIntoView({ behavior: 'smooth' });

    // Disable add button if limit reached
    if (questionCount >= totalQuestions) document.getElementById('addQuestionBtn').disabled = true;
}

function saveAndFinish() {
    const questions = [];
    for (let i = 1; i <= questionCount; i++) {
        const qText = document.querySelector(`[name="q${i}_text"]`).value.trim();
        const optA = document.querySelector(`[name="q${i}_opt_a"]`).value.trim();
        const optB = document.querySelector(`[name="q${i}_opt_b"]`).value.trim();
        const optC = document.querySelector(`[name="q${i}_opt_c"]`).value.trim();
        const optD = document.querySelector(`[name="q${i}_opt_d"]`).value.trim();
        const correct = document.querySelector(`[name="q${i}_correct_answer"]`).value;

        if (!qText || !optA || !optB || !optC || !optD || !correct) {
            alert(`Please fill in all fields for Question ${i}`);
            return;
        }

        questions.push({
            question_text: qText,
            option_a: optA,
            option_b: optB,
            option_c: optC,
            option_d: optD,
            correct_option: correct,
            marks: 1
        });
    }

    const examData = {
        exam_title: examTitle,
        subject: subject,
        total_questions: questionCount,
        questions: questions
    };

    console.log('Exam JSON Data:', examData);
    alert(`Successfully collected ${questionCount} questions! Check console for JSON format.`);
}
</script>

</body>
</html>
